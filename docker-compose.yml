version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  redis:
    image: redis:7-alpine
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

networks:
  backend:
    driver: bridge
 