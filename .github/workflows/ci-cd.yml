name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8

      - name: Python lint
        run: flake8 api worker

      - name: Install Node dependencies
        run: npm install -g eslint

      - name: JS lint
        run: eslint frontend

      - name: Install Hadolint
        run: |
            wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
            chmod +x hadolint
            sudo mv hadolint /usr/local/bin/hadolint

      - name: Run Docker lint (Hadolint)
        run: hadolint **/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      # ✅ FIX 1: ensure imports work in CI
      - name: Run tests
        run: PYTHONPATH=. pytest --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build API
        run: |
          docker build -t api:${{ github.sha }} api
          docker tag api:${{ github.sha }} api:latest

      - name: Build frontend
        run: |
          docker build -t frontend:${{ github.sha }} frontend
          docker tag frontend:${{ github.sha }} frontend:latest

      - name: Build worker
        run: |
          docker build -t worker:${{ github.sha }} worker
          docker tag worker:${{ github.sha }} worker:latest


  security:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget

        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh

    - name: Scan API image
      run: |
        trivy image api:${{ github.sha }} \
          --exit-code 1 \
          --severity CRITICAL,HIGH \
          --format sarif > trivy.sarif

    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start stack
        run: docker-compose up -d

      # ✅ FIX 3: give containers time to start
      - name: Wait for services
        run: sleep 10

      - name: Run integration test
        run: python tests/integration_test.py

      - name: Shutdown
        if: always()
        run: docker-compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy new version
        run: |
          docker stop api_old || true
          docker rename api api_old || true

          docker run -d --name api_new \
            -p 8000:8000 \
            api:${{ github.sha }}

      - name: Health check
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 5
          done
          exit 1

      - name: Rollback if failed
        if: failure()
        run: |
          docker stop api_new || true
          docker start api_old || true