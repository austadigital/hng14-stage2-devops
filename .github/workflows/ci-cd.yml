name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python lint
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8
      - run: flake8 api worker

      # JS lint
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install eslint --save-dev
      - run: npx eslint frontend || true

      # Hadolint
      - run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint

      - run: hadolint -i DL3008 **/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - run: PYTHONPATH=. pytest --cov=api --cov-report=xml


  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api:${{ github.sha }} api
      - run: docker build -t frontend:${{ github.sha }} frontend
      - run: docker build -t worker:${{ github.sha }} worker


  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # ✅ FIXED Trivy install
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh

      - name: Scan API image
        run: |
          trivy image api:${{ github.sha }} \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --format sarif > trivy.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - run: docker-compose up -d
      - run: sleep 10
      - run: python tests/integration_test.py
      - run: docker-compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Deploy step placeholder"