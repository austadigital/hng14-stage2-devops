name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

# =========================
# 1. LINT
# =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 api

      # Node lint
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint .

      # Docker lint
      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# =========================
# 2. TEST
# =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# =========================
# 3. BUILD + LOCAL REGISTRY
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: docker login localhost:5000 -u test -p test || true

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


# =========================
# 4. SECURITY SCAN (TRIVY)
# =========================
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/api:${{ github.sha }}

      - name: Generate SARIF
        run: |
          trivy image --format sarif -o trivy-api.sarif localhost:5000/api:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


# =========================
# 5. INTEGRATION TEST
# =========================
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Submit job
        run: curl -X POST http://localhost:8000/jobs

      - name: Poll job status
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/status | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down


# =========================
# 6. DEPLOY (MAIN ONLY)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy new container
        run: |
          docker run -d --name api_new -p 8001:8000 localhost:5000/api:${{ github.sha }}

      - name: Health check (60s max)
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8001/health && exit 0
            sleep 5
          done
          docker stop api_new
          exit 1

      - name: Swap containers
        run: |
          docker stop api_old || true
          docker rename api_new api_old





























